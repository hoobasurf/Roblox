<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#02030a"/>
<title>RYONIX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root{
  --cyan:#00fff5; --pink:#ff007a; --yellow:#ffee00;
  --purple:#9d00ff; --dark:#02030a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#02030a;
  font-family:'Rajdhani',sans-serif;
  touch-action:none;
}

/* ======= AUTH ======= */
#authWrap{
position:fixed;inset:0;z-index:200;
display:flex;align-items:center;justify-content:center;
background:#02030a;padding:20px;
}
.bg-grid{
position:fixed;inset:0;z-index:0;
background-image:
linear-gradient(rgba(0,255,245,.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,255,245,.04) 1px,transparent 1px);
background-size:40px 40px;
animation:gridMove 20s linear infinite;
pointer-events:none;
}
@keyframes gridMove{0%{background-position:0 0;}100%{background-position:40px 40px;}}

#authCard{
position:relative;width:100%;max-width:420px;z-index:1;
background:linear-gradient(145deg,rgba(2,8,25,.97),rgba(5,2,20,.97));
border:1px solid rgba(0,255,245,.18);
border-radius:12px;padding:40px 28px 32px;
box-shadow:0 0 60px rgba(0,255,245,.07),inset 0 1px 0 rgba(255,255,255,.04);
}
.corner{position:absolute;width:14px;height:14px;border-color:var(–cyan);border-style:solid;opacity:.6;}
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px;}
.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0;}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px;}
.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0;}

/* LOGO */
.auth-logo{
text-align:center;
font-family:‘Syncopate’,sans-serif;
font-size:clamp(38px,11vw,56px);
font-weight:700;
letter-spacing:10px;
margin-bottom:6px;
color:#00fff5;
animation:logoGlow 2s ease-in-out infinite;
}
@keyframes logoGlow{
0%,100%{color:#00fff5;text-shadow:0 0 12px #00fff5,0 0 35px #00fff5,0 0 70px rgba(0,255,245,.4);}
33%{color:#ff007a;text-shadow:0 0 12px #ff007a,0 0 35px #ff007a,0 0 70px rgba(255,0,122,.4);}
66%{color:#ffee00;text-shadow:0 0 12px #ffee00,0 0 35px #ffee00,0 0 70px rgba(255,238,0,.4);}
}
.auth-sub{
text-align:center;font-family:‘Share Tech Mono’,monospace;
font-size:9px;letter-spacing:5px;
color:rgba(0,255,245,.35);text-transform:uppercase;margin-bottom:30px;
}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:24px;}
.tab{
flex:1;padding:11px;text-align:center;cursor:pointer;
font-family:‘Share Tech Mono’,monospace;font-size:11px;letter-spacing:2px;
color:rgba(255,255,255,.3);
background:rgba(0,255,245,.03);
border:1px solid rgba(0,255,245,.08);
border-radius:4px;transition:all .2s;
}
.tab.on{
color:var(–cyan);
background:rgba(0,255,245,.1);
border-color:rgba(0,255,245,.35);
box-shadow:0 0 15px rgba(0,255,245,.1) inset;
}

/* CHAMPS */
.field{margin-bottom:18px;}
.field label{
display:block;font-family:‘Share Tech Mono’,monospace;
font-size:9px;letter-spacing:3px;text-transform:uppercase;
color:rgba(0,255,245,.4);margin-bottom:7px;
}
.field input{
width:100%;padding:13px 15px;
background:rgba(0,255,245,.04);
border:1px solid rgba(0,255,245,.14);
border-radius:6px;color:#fff;
font-family:‘Share Tech Mono’,monospace;font-size:15px;
outline:none;transition:all .2s;
-webkit-appearance:none;
}
.field input:focus{
border-color:var(–cyan);
background:rgba(0,255,245,.08);
box-shadow:0 0 20px rgba(0,255,245,.1);
}

/* BOUTON */
.btn-neon{
width:100%;padding:15px;margin-top:4px;
background:transparent;
border:1px solid var(–cyan);
color:var(–cyan);cursor:pointer;border-radius:6px;
font-family:‘Share Tech Mono’,monospace;font-size:12px;letter-spacing:3px;
text-transform:uppercase;transition:all .2s;
-webkit-appearance:none;min-height:50px;
}
.btn-neon:active{background:rgba(0,255,245,.15);box-shadow:0 0 30px rgba(0,255,245,.3);}

#authMsg{
text-align:center;margin-top:14px;min-height:20px;
font-family:‘Share Tech Mono’,monospace;font-size:12px;letter-spacing:1px;
}
#authMsg.err{color:var(–pink);}
#authMsg.ok{color:var(–cyan);}

/* ======= CANVAS ======= */
#gc{position:fixed;inset:0;display:block;}

/* ======= HUD ======= */
#hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10;}

/* Topbar */
#topbar{
position:absolute;top:0;left:0;right:0;
padding:8px 14px;display:flex;align-items:center;gap:10px;
background:linear-gradient(180deg,rgba(2,3,10,.95),transparent);
pointer-events:auto;
}
.hud-logo{
font-family:‘Syncopate’,sans-serif;font-size:12px;letter-spacing:4px;
color:var(–cyan);text-shadow:0 0 8px var(–cyan);
}
.stat-group{display:flex;flex-direction:column;gap:3px;width:110px;}
.stat-row{display:flex;align-items:center;gap:5px;}
.sico{font-size:9px;width:12px;text-align:center;}
.sname{font-family:‘Share Tech Mono’,monospace;font-size:7px;color:rgba(255,255,255,.3);width:20px;}
.bar-bg{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.bar-f{height:100%;border-radius:2px;transition:width .4s;}
#hpF{background:linear-gradient(90deg,#ff0055,#ff4488);}
#enF{background:linear-gradient(90deg,var(–purple),var(–cyan));}
#xpF{background:linear-gradient(90deg,var(–yellow),#ff6a00);}
#pInfo{margin-left:auto;display:flex;align-items:center;gap:8px;}
#pTag{font-family:‘Share Tech Mono’,monospace;font-size:10px;color:var(–cyan);}
#credDisplay{font-family:‘Syncopate’,sans-serif;font-size:10px;color:var(–yellow);}
.hud-btn{
padding:5px 10px;background:rgba(0,255,245,.06);
border:1px solid rgba(0,255,245,.15);color:rgba(255,255,255,.5);
border-radius:4px;cursor:pointer;font-family:‘Share Tech Mono’,monospace;
font-size:10px;pointer-events:auto;min-height:34px;
}

/* Zone */
#zoneBadge{
position:absolute;top:54px;left:50%;transform:translateX(-50%);
background:rgba(2,5,18,.8);border:1px solid rgba(0,255,245,.15);
border-radius:20px;padding:4px 14px;
font-family:‘Syncopate’,sans-serif;font-size:8px;letter-spacing:3px;
color:var(–cyan);pointer-events:none;white-space:nowrap;
text-shadow:0 0 8px var(–cyan);
}

/* Minimap */
#minimap{
position:absolute;top:78px;right:10px;
width:110px;height:110px;
background:rgba(2,5,18,.85);border:1px solid rgba(0,255,245,.1);
border-radius:8px;overflow:hidden;
}
#mmCanvas{width:100%;height:100%;}

/* Online */
#onlineWrap{
position:absolute;top:78px;left:10px;width:140px;
background:rgba(2,5,18,.85);border:1px solid rgba(0,255,245,.08);
border-radius:8px;padding:10px;
}
#onlineWrap h3{font-family:‘Syncopate’,sans-serif;font-size:7px;letter-spacing:2px;color:var(–cyan);margin-bottom:8px;}
#pList{list-style:none;display:flex;flex-direction:column;gap:5px;}
#pList li{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:6px;}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pdotP 2s infinite;}
@keyframes pdotP{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Notifs */
#notifs{
position:absolute;top:78px;left:50%;transform:translateX(-50%);
display:flex;flex-direction:column;gap:6px;align-items:center;
z-index:50;pointer-events:none;width:90%;max-width:320px;
}
.notif{
padding:7px 18px;border-radius:30px;
font-family:‘Syncopate’,sans-serif;font-size:8px;letter-spacing:2px;
animation:notifIn .3s ease both;backdrop-filter:blur(12px);
white-space:nowrap;text-align:center;
}
@keyframes notifIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
.notif.cyan{background:rgba(0,255,245,.1);border:1px solid rgba(0,255,245,.3);color:var(–cyan);}
.notif.pink{background:rgba(255,0,122,.1);border:1px solid rgba(255,0,122,.3);color:var(–pink);}
.notif.gold{background:rgba(255,238,0,.1);border:1px solid rgba(255,238,0,.3);color:var(–yellow);}

/* Stats */
#statsWrap{
position:absolute;bottom:220px;right:10px;
display:flex;flex-direction:column;gap:5px;align-items:flex-end;
}
.spill{
background:rgba(2,5,18,.85);border:1px solid rgba(0,255,245,.09);
border-radius:6px;padding:4px 10px;
font-family:‘Share Tech Mono’,monospace;font-size:9px;
display:flex;gap:6px;
}
.sv{color:var(–cyan);}

/* Chat */
#chatWrap{
position:absolute;bottom:10px;left:10px;width:220px;
background:rgba(2,5,18,.9);border:1px solid rgba(0,255,245,.1);
border-radius:8px;overflow:hidden;pointer-events:auto;
}
#chatMsgs{
height:90px;overflow-y:auto;padding:8px;
display:flex;flex-direction:column;gap:4px;
}
#chatMsgs::-webkit-scrollbar{width:2px;}
#chatMsgs::-webkit-scrollbar-thumb{background:rgba(0,255,245,.2);}
.cmsg{font-size:10px;line-height:1.4;font-family:‘Share Tech Mono’,monospace;}
.cmsg .cn{font-weight:bold;}
.cmsg.sys{color:rgba(255,255,255,.3);font-style:italic;font-size:9px;}
#chatRow{display:flex;border-top:1px solid rgba(0,255,245,.07);}
#chatIn{
flex:1;padding:7px 10px;background:transparent;border:none;
color:#fff;font-family:‘Share Tech Mono’,monospace;font-size:12px;outline:none;
}
#chatSnd{
padding:7px 12px;background:rgba(0,255,245,.06);border:none;
color:var(–cyan);cursor:pointer;font-size:12px;pointer-events:auto;
min-width:34px;min-height:34px;
}

/* ======= TOUCH CONTROLS ======= */
#touchControls{
position:fixed;inset:0;pointer-events:none;z-index:20;
display:none;
}

/* Joystick base */
.joy-wrap{position:absolute;width:130px;height:130px;pointer-events:auto;}
#joyLeft{bottom:24px;left:24px;}
#joyRight{bottom:24px;right:24px;}
.joy-base{
position:absolute;inset:0;border-radius:50%;
background:rgba(0,255,245,.05);
border:2px solid rgba(0,255,245,.2);
}
#joyRight .joy-base{background:rgba(255,0,122,.05);border-color:rgba(255,0,122,.2);}
.joy-knob{
position:absolute;width:50px;height:50px;border-radius:50%;
top:50%;left:50%;transform:translate(-50%,-50%);
background:radial-gradient(circle at 35% 35%,rgba(0,255,245,.5),rgba(0,255,245,.2));
border:2px solid rgba(0,255,245,.7);
box-shadow:0 0 20px rgba(0,255,245,.3);
pointer-events:none;
}
#joyRight .joy-knob{
background:radial-gradient(circle at 35% 35%,rgba(255,0,122,.5),rgba(255,0,122,.2));
border-color:rgba(255,0,122,.7);
box-shadow:0 0 20px rgba(255,0,122,.3);
}
.joy-lbl{
position:absolute;top:-20px;left:50%;transform:translateX(-50%);
font-family:‘Share Tech Mono’,monospace;font-size:8px;letter-spacing:2px;
color:rgba(0,255,245,.4);white-space:nowrap;
}
#joyRight .joy-lbl{color:rgba(255,0,122,.4);}

/* Bouton SAUT */
#btnJump{
position:absolute;bottom:160px;right:28px;
width:68px;height:68px;border-radius:50%;
background:rgba(0,255,245,.08);
border:2px solid rgba(0,255,245,.5);
color:var(–cyan);cursor:pointer;pointer-events:auto;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
font-family:‘Syncopate’,sans-serif;font-size:7px;letter-spacing:1px;
box-shadow:0 0 20px rgba(0,255,245,.15);
transition:all .1s;-webkit-appearance:none;
}
#btnJump:active{background:rgba(0,255,245,.25);box-shadow:0 0 40px rgba(0,255,245,.5);transform:scale(.94);}
#btnJump .ico{font-size:20px;}

/* Bouton SPRINT */
#btnSprint{
position:absolute;bottom:160px;left:28px;
width:68px;height:68px;border-radius:50%;
background:rgba(255,0,122,.07);
border:2px solid rgba(255,0,122,.4);
color:var(–pink);cursor:pointer;pointer-events:auto;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
font-family:‘Syncopate’,sans-serif;font-size:7px;letter-spacing:1px;
box-shadow:0 0 20px rgba(255,0,122,.1);
transition:all .1s;-webkit-appearance:none;
}
#btnSprint.on,#btnSprint:active{background:rgba(255,0,122,.2);box-shadow:0 0 40px rgba(255,0,122,.4);}
#btnSprint .ico{font-size:20px;}

/* Bouton CHAT mobile */
#btnChat{
position:absolute;bottom:168px;left:50%;transform:translateX(-50%);
padding:8px 16px;border-radius:20px;
background:rgba(2,5,18,.75);border:1px solid rgba(0,255,245,.2);
color:rgba(0,255,245,.6);font-family:‘Share Tech Mono’,monospace;font-size:10px;letter-spacing:2px;
pointer-events:auto;cursor:pointer;-webkit-appearance:none;
white-space:nowrap;
}

/* Safe area iOS */
@supports (padding-bottom: env(safe-area-inset-bottom)){
#joyLeft,#joyRight{bottom:calc(24px + env(safe-area-inset-bottom));}
#btnJump,#btnSprint{bottom:calc(160px + env(safe-area-inset-bottom));}
#btnChat{bottom:calc(168px + env(safe-area-inset-bottom));}
}

/* ======= LOCK OVERLAY ======= */
#lockOverlay{
position:fixed;inset:0;z-index:50;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;
background:rgba(2,3,10,.88);backdrop-filter:blur(6px);padding:20px;
}
.lock-title{
font-family:‘Syncopate’,sans-serif;
font-size:clamp(44px,13vw,72px);font-weight:700;letter-spacing:10px;
text-align:center;color:#00fff5;
animation:logoGlow 2s ease-in-out infinite;
}
.lock-sub{
font-family:‘Share Tech Mono’,monospace;font-size:10px;letter-spacing:4px;
color:rgba(255,255,255,.3);text-align:center;text-transform:uppercase;
}
.lock-hint{
font-family:‘Share Tech Mono’,monospace;font-size:9px;letter-spacing:3px;
color:rgba(0,255,245,.3);text-align:center;text-transform:uppercase;margin-top:-8px;
}
.lock-btn{
padding:15px 44px;border-radius:6px;cursor:pointer;
font-family:‘Share Tech Mono’,monospace;font-size:12px;letter-spacing:3px;
background:transparent;border:1px solid var(–cyan);color:var(–cyan);
transition:all .2s;min-height:50px;min-width:220px;-webkit-appearance:none;
}
.lock-btn:active{background:rgba(0,255,245,.12);box-shadow:0 0 40px rgba(0,255,245,.3);}
</style>

</head>
<body>

<div class="bg-grid"></div>

<!-- ====== AUTH ====== -->

<div id="authWrap">
  <div id="authCard">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="auth-logo">RYONIX</div>
    <div class="auth-sub">// nouvelle ere virtuelle //</div>
    <div class="tabs">
      <div class="tab on" id="tabL" onclick="showT('l')">Connexion</div>
      <div class="tab" id="tabR" onclick="showT('r')">S'inscrire</div>
    </div>
    <div id="fL">
      <div class="field"><label>// Email</label>
        <input id="lE" type="email" inputmode="email" placeholder="runner@ryonix.gg" autocomplete="email"/>
      </div>
      <div class="field"><label>// Mot de passe</label>
        <input id="lP" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-neon" onclick="doLogin()">[ CONNEXION ]</button>
    </div>
    <div id="fR" style="display:none">
      <div class="field"><label>// Pseudo</label>
        <input id="rN" type="text" placeholder="CyberRunner99" autocomplete="username"/>
      </div>
      <div class="field"><label>// Email</label>
        <input id="rE" type="email" inputmode="email" placeholder="runner@ryonix.gg" autocomplete="email"/>
      </div>
      <div class="field"><label>// Mot de passe</label>
        <input id="rP" type="password" placeholder="Min. 6 caracteres" autocomplete="new-password"/>
      </div>
      <button class="btn-neon" onclick="doReg()">[ CREER MON COMPTE ]</button>
    </div>
    <div id="authMsg"></div>
  </div>
</div>

<!-- ====== CANVAS ====== -->

<canvas id="gc"></canvas>

<!-- ====== HUD ====== -->

<div id="hud">

  <!-- Lock overlay -->

  <div id="lockOverlay">
    <div class="lock-title">RYONIX</div>
    <div class="lock-sub">// nouvelle ere virtuelle //</div>
    <div class="lock-hint" id="lockHint">// TOUCH READY //</div>
    <button class="lock-btn" id="lockBtn">[ ENTRER DANS LA VILLE ]</button>
  </div>

  <!-- Topbar -->

  <div id="topbar">
    <div class="hud-logo">RX//</div>
    <div class="stat-group">
      <div class="stat-row"><span class="sico">♥</span><span class="sname">VIE</span><div class="bar-bg"><div class="bar-f" id="hpF" style="width:100%"></div></div></div>
      <div class="stat-row"><span class="sico">⚡</span><span class="sname">EN</span><div class="bar-bg"><div class="bar-f" id="enF" style="width:75%"></div></div></div>
      <div class="stat-row"><span class="sico">★</span><span class="sname">XP</span><div class="bar-bg"><div class="bar-f" id="xpF" style="width:0%"></div></div></div>
    </div>
    <div id="pInfo">
      <span id="pTag">—</span>
      <span id="credDisplay">B 0</span>
      <button class="hud-btn" onclick="doOut()">EXIT</button>
    </div>
  </div>

  <div id="zoneBadge">DOWNTOWN</div>

  <div id="minimap">
    <canvas id="mmCanvas" width="110" height="110"></canvas>
  </div>

  <div id="onlineWrap">
    <h3>RUNNERS</h3>
    <ul id="pList"></ul>
  </div>

  <div id="notifs"></div>

  <div id="statsWrap">
    <div class="spill">FPS <span class="sv" id="sv_fps">60</span></div>
    <div class="spill">SPD <span class="sv" id="sv_spd">0</span></div>
  </div>

  <div id="chatWrap">
    <div id="chatMsgs"></div>
    <div id="chatRow">
      <input id="chatIn" type="text" placeholder="// message..." maxlength="100"/>
      <button id="chatSnd" onclick="sendChat()">&#9654;</button>
    </div>
  </div>

</div>

<!-- ====== TOUCH CONTROLS ====== -->

<div id="touchControls">
  <div class="joy-wrap" id="joyLeft">
    <div class="joy-base"></div>
    <div class="joy-knob" id="joyLK"></div>
    <div class="joy-lbl">BOUGER</div>
  </div>
  <div class="joy-wrap" id="joyRight">
    <div class="joy-base"></div>
    <div class="joy-knob" id="joyRK"></div>
    <div class="joy-lbl">CAMERA</div>
  </div>
  <button id="btnJump"><span class="ico">&#8679;</span>SAUT</button>
  <button id="btnSprint"><span class="ico">&#9889;</span>SPRINT</button>
  <button id="btnChat" onclick="openMobileChat()">&#128172; CHAT</button>
</div>

<script>
const SB_URL = 'https://spelbrydyfesvnhebqek.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwZWxicnlkeWZlc3ZuaGVicWVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NjMxMDYsImV4cCI6MjA4NzIzOTEwNn0.GSrTcl0pS_QBvdsjSqD2HHGiTX0txslNGtA4PQxxbNQ'
const sb = window.supabase.createClient(SB_URL, SB_KEY)

const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0

// ====== AUTH ======
let ME=null, MYNAME=''

function showT(t){
  document.getElementById('tabL').classList.toggle('on', t==='l')
  document.getElementById('tabR').classList.toggle('on', t==='r')
  document.getElementById('fL').style.display = t==='l' ? 'block' : 'none'
  document.getElementById('fR').style.display = t==='r' ? 'block' : 'none'
  setMsg('')
}

function setMsg(m, type=''){
  const el = document.getElementById('authMsg')
  el.textContent = m
  el.className = type
}

async function doLogin(){
  const email = document.getElementById('lE').value.trim()
  const pass  = document.getElementById('lP').value
  if(!email || !pass) return setMsg('Remplis tous les champs', 'err')
  setMsg('Connexion...', 'ok')
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password:pass})
    if(error) return setMsg(error.message, 'err')
    ME = data.user
    await loadName()
    boot()
  } catch(e){
    setMsg('Erreur reseau, reessaie', 'err')
  }
}

async function doReg(){
  const name  = document.getElementById('rN').value.trim()
  const email = document.getElementById('rE').value.trim()
  const pass  = document.getElementById('rP').value
  if(!name)  return setMsg('Pseudo requis', 'err')
  if(!email) return setMsg('Email requis', 'err')
  if(pass.length < 6) return setMsg('Mot de passe trop court (min 6)', 'err')
  setMsg('Creation du compte...', 'ok')
  try {
    const {data, error} = await sb.auth.signUp({email, password:pass})
    if(error) return setMsg(error.message, 'err')
    ME = data.user
    MYNAME = name
    await sb.from('profiles').upsert({id: ME.id, username: name})
    setMsg('Compte cree ! Demarrage...', 'ok')
    setTimeout(boot, 800)
  } catch(e){
    setMsg('Erreur reseau, reessaie', 'err')
  }
}

async function loadName(){
  try {
    const {data} = await sb.from('profiles').select('username').eq('id', ME.id).single()
    MYNAME = data?.username || ME.email.split('@')[0]
  } catch(e){
    MYNAME = ME.email.split('@')[0]
  }
}

async function doOut(){
  if(CHAN){ CHAN.send({type:'broadcast',event:'leave',payload:{id:ME.id,name:MYNAME}}); CHAN.unsubscribe() }
  await sb.auth.signOut()
  location.reload()
}

let PARTS=[], BUILD_LIGHTS=[]
let lastSend=0, fC=0, fT=0, T=0

function addBuildings(){
  const defs = [
    [0,-20,12,12,45,0x040a18,0x00fff5,'sky'],
    [15,-15,8,8,35,0x080418,0xff007a,'sky'],
    [-15,-15,8,8,40,0x040a18,0x9d00ff,'sky'],
    [28,-10,10,10,28,0x060a14,0x00fff5,'twr'],
    [-28,-10,10,10,32,0x080410,0xff007a,'twr'],
    [45,-5,14,10,22,0x040810,0xffee00,'blk'],
    [60,0,10,8,30,0x060a10,0x00fff5,'twr'],
    [-45,-5,14,10,20,0x040a14,0x9d00ff,'blk'],
    [-60,0,10,8,28,0x060810,0x00fff5,'twr'],
    [10,-55,10,8,36,0x040a18,0x00fff5,'sky'],
    [-10,-55,10,8,30,0x080414,0xff007a,'twr'],
    [0,-70,16,12,50,0x030810,0x00fff5,'sky'],
    [90,-40,18,14,55,0x030a14,0x00fff5,'sky'],
    [-90,-40,18,14,60,0x050812,0xff007a,'sky'],
  ]
  defs.forEach(([x,z,w,d,h,col,glow,type])=>{
    const geo = new THREE.BoxGeometry(w,h,d)
    const mat = new THREE.MeshPhongMaterial({color:col,emissive:glow,emissiveIntensity:0.07,shininess:60})
    const mesh = new THREE.Mesh(geo,mat)
    mesh.position.set(x,h/2,z)
    mesh.userData.isBuild = true
    scene.add(mesh); buildings.push(mesh)

    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(w+.1,0.15,d+.1),
      new THREE.MeshBasicMaterial({color:glow,transparent:true,opacity:0.6})
    )
    roof.position.set(x,h+.07,z)
    scene.add(roof)

    const rl = new THREE.PointLight(glow,1.2,18)
    rl.position.set(x,h+1,z)
    scene.add(rl)
    BUILD_LIGHTS.push({light:rl,baseI:1.2})

    if(type==='sky'){
      const bl = new THREE.PointLight(0xff2200,3,8)
      bl.position.set(x,h+7,z)
      bl.userData.blink = true
      scene.add(bl)
      BUILD_LIGHTS.push({light:bl,baseI:3,blink:true})
    }
  })

  // Plateformes
  const wp = [
    [0,8,-20,20,1,16,0x040a18,0x00fff5],
    [20,12,-15,12,1,10,0x080414,0xff007a],
    [-20,10,-18,10,1,10,0x060810,0x9d00ff],
    [0,18,-30,10,1,10,0x040a14,0xffee00],
    [12,22,-28,8,1,8,0x030810,0x00fff5],
    [-12,20,-35,8,1,8,0x080414,0xff007a],
    [0,28,-45,8,1,8,0x040a18,0x9d00ff],
    [25,7,10,14,1,10,0x060810,0x00fff5],
    [-25,9,12,14,1,10,0x040a14,0xff007a],
    [0,14,-22,40,0.5,4,0x030810,0x00fff5],
  ]
  wp.forEach(([x,y,z,w,h,d,col,glow])=>{
    const geo = new THREE.BoxGeometry(w,h,d)
    const mat = new THREE.MeshPhongMaterial({color:col,emissive:glow,emissiveIntensity:0.22,shininess:80})
    const mesh = new THREE.Mesh(geo,mat)
    mesh.position.set(x,y,z)
    mesh.userData.isPlatform = true
    scene.add(mesh); platforms.push(mesh)
    const edges = new THREE.EdgesGeometry(geo)
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:glow,transparent:true,opacity:0.8}))

    scene.add(line)
    const pl = new THREE.PointLight(glow,1,10)

function addCollectibles(){
  const spots = [[5,9,-20],[-5,9,-20],[12,13,-15],[-12,11,-18],[0,19,-30],[8,23,-28],[0,29,-45],[25,8,10],[-25,10,12],[0,15,-22]]
  const cols = [0x00fff5,0xff007a,0xffee00,0x9d00ff,0xff6a00]
  spots.forEach((pos,i)=>{
    const col = cols[i%cols.length]
    const geo = new THREE.OctahedronGeometry(0.35,0)
    const mat = new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.9,shininess:200,transparent:true,opacity:.95})
    const m = new THREE.Mesh(geo,mat)
    m.position.set(pos[0],pos[1]+.8,pos[2])
    m.userData.isCollect=true; m.userData.col=col; m.userData.val=100; m.userData.baseY=m.position.y
    scene.add(m); collectibles.push(m)
    const pl = new THREE.PointLight(col,2,7)
    pl.position.copy(m.position); m.userData.light=pl; scene.add(pl)
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.5,0.04,6,24),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5})
    )
    ring.position.copy(m.position); m.userData.ring=ring; scene.add(ring)
  })
}

function buildSky(){
  const sg = new THREE.BufferGeometry()
  const pos=[], col=[]
  for(let i=0;i<3000;i++){
    const r=280+Math.random()*80, th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI
    pos.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th))
    const c = new THREE.Color().setHSL(Math.random(),.5,.85)
    col.push(c.r,c.g,c.b)
  }
  sg.setAttribute('position', new THREE.Float32BufferAttribute(pos,3))
  sg.setAttribute('color', new THREE.Float32BufferAttribute(col,3))
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({size:.5,vertexColors:true})))
}

// ====== POINTER LOCK ======
function initPL(){
  const btn = document.getElementById('lockBtn')
  const ov  = document.getElementById('lockOverlay')
  if(IS_TOUCH){
    btn.addEventListener('touchend', e=>{e.preventDefault(); ov.style.display='none'}, {passive:false})
    btn.addEventListener('click', ()=>{ ov.style.display='none' })
  } else {
    btn.addEventListener('click', ()=>document.getElementById('gc').requestPointerLock())
    document.addEventListener('pointerlockchange', ()=>{
      LOCKED = document.pointerLockElement === document.getElementById('gc')
      ov.style.display = LOCKED ? 'none' : 'flex'
    })
    document.addEventListener('mousemove', e=>{
      if(!LOCKED) return
      YAW   -= e.movementX * .0022
      PITCH -= e.movementY * .0022
      PITCH = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, PITCH))
    })
  }
}

function initKB(){
  if(IS_TOUCH) return
  document.addEventListener('keydown', e=>{
    if(document.getElementById('chatIn')===document.activeElement) return
    KEYS[e.code]=true
    if(e.code==='KeyT'){ e.preventDefault(); document.getElementById('chatIn').focus(); document.exitPointerLock() }
  })
  document.addEventListener('keyup', e=>{ KEYS[e.code]=false })
  document.getElementById('chatIn').addEventListener('keydown', e=>{
    if(e.code==='Enter'){ sendChat(); e.preventDefault() }
    if(e.code==='Escape'){ document.getElementById('chatIn').blur(); document.getElementById('gc').requestPointerLock() }
  })
}

// ====== TOUCH ======
const joy = {
  L:{active:false,id:null,sx:0,sy:0,dx:0,dy:0},
  R:{active:false,id:null,sx:0,sy:0,dx:0,dy:0}
}
let touchSprint = false
const MAX_JOY = 46

function initTouch(){
  const tc = document.getElementById('touchControls')
  tc.style.display = 'block'

  const knobL = document.getElementById('joyLK')
  const knobR = document.getElementById('joyRK')

  function getJoyRect(id){ return document.getElementById(id).getBoundingClientRect() }

  document.addEventListener('touchstart', e=>{
    e.preventDefault()
    for(const t of e.changedTouches){
      const rL = getJoyRect('joyLeft'), rR = getJoyRect('joyRight')
      const inL = t.clientX>=rL.left-20&&t.clientX<=rL.right+20&&t.clientY>=rL.top-20&&t.clientY<=rL.bottom+20
      const inR = t.clientX>=rR.left-20&&t.clientX<=rR.right+20&&t.clientY>=rR.top-20&&t.clientY<=rR.bottom+20
      if(inL&&!joy.L.active){
        joy.L.active=true; joy.L.id=t.identifier
        joy.L.sx=rL.left+rL.width/2; joy.L.sy=rL.top+rL.height/2
      } else if(inR&&!joy.R.active){
        joy.R.active=true; joy.R.id=t.identifier
        joy.R.sx=rR.left+rR.width/2; joy.R.sy=rR.top+rR.height/2
      }
    }
  },{passive:false})

  document.addEventListener('touchmove', e=>{
    e.preventDefault()
    for(const t of e.changedTouches){
      if(joy.L.active && t.identifier===joy.L.id){
        const dx=t.clientX-joy.L.sx, dy=t.clientY-joy.L.sy
        const dist=Math.min(MAX_JOY,Math.sqrt(dx*dx+dy*dy))
        const angle=Math.atan2(dy,dx)
        joy.L.dx=(dist/MAX_JOY)*Math.cos(angle)
        joy.L.dy=(dist/MAX_JOY)*Math.sin(angle)
        knobL.style.transform=`translate(calc(-50% + ${joy.L.dx*MAX_JOY}px), calc(-50% + ${joy.L.dy*MAX_JOY}px))`
      }
      if(joy.R.active && t.identifier===joy.R.id){
        const dx=t.clientX-joy.R.sx, dy=t.clientY-joy.R.sy
        const dist=Math.min(MAX_JOY,Math.sqrt(dx*dx+dy*dy))
        const angle=Math.atan2(dy,dx)
        joy.R.dx=(dist/MAX_JOY)*Math.cos(angle)
        joy.R.dy=(dist/MAX_JOY)*Math.sin(angle)
        knobR.style.transform=`translate(calc(-50% + ${joy.R.dx*MAX_JOY}px), calc(-50% + ${joy.R.dy*MAX_JOY}px))`
        YAW   -= joy.R.dx * 0.045
        PITCH -= joy.R.dy * 0.028
        PITCH = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, PITCH))
      }
    }
  },{passive:false})

  document.addEventListener('touchend', e=>{
    e.preventDefault()
    for(const t of e.changedTouches){
      if(joy.L.active&&t.identifier===joy.L.id){
        joy.L.active=false; joy.L.dx=0; joy.L.dy=0
        knobL.style.transform='translate(-50%,-50%)'
      }
      if(joy.R.active&&t.identifier===joy.R.id){
        joy.R.active=false; joy.R.dx=0; joy.R.dy=0
        knobR.style.transform='translate(-50%,-50%)'
      }
    }
  },{passive:false})

  document.addEventListener('touchcancel', e=>{
    joy.L.active=false; joy.L.dx=0; joy.L.dy=0; knobL.style.transform='translate(-50%,-50%)'
    joy.R.active=false; joy.R.dx=0; joy.R.dy=0; knobR.style.transform='translate(-50%,-50%)'
  },{passive:false})

  // Saut
  document.getElementById('btnJump').addEventListener('touchstart', e=>{
    e.stopPropagation(); e.preventDefault()
    if(onGround){ PVEL.y=JUMP; onGround=false; spawnJumpBurst() }
  },{passive:false})

  // Sprint
  const bs = document.getElementById('btnSprint')
  bs.addEventListener('touchstart', e=>{ e.stopPropagation(); e.preventDefault(); touchSprint=true; bs.classList.add('on') },{passive:false})
  bs.addEventListener('touchend',   e=>{ e.stopPropagation(); e.preventDefault(); touchSprint=false; bs.classList.remove('on') },{passive:false})
}

// ====== GAME LOOP ======
let colorShift=0
function loop(){
  requestAnimationFrame(loop)
  const dt = Math.min(clock.getDelta(), .05)
  T+=dt; fC++; fT+=dt
  if(fT>=1){ document.getElementById('sv_fps').textContent=fC; fC=0; fT=0 }
  colorShift = (colorShift+dt*.3)%1

  updatePlayer(dt)
  updateWorld(dt)
  updateCollectibles(dt)
  updateParticles(dt)
  updateMinimap()
  renderer.render(scene, cam)
}

function updatePlayer(dt){
  const fwd   = new THREE.Vector3(-Math.sin(YAW),0,-Math.cos(YAW))
  const right = new THREE.Vector3( Math.cos(YAW),0,-Math.sin(YAW))
  const sprinting = touchSprint || KEYS['ShiftLeft'] || KEYS['ShiftRight']
  const spd = sprinting ? SPRINT_SPD : SPD
  let mx=0, mz=0

  if(IS_TOUCH && joy.L.active){
    mx = fwd.x*(-joy.L.dy) + right.x*joy.L.dx
    mz = fwd.z*(-joy.L.dy) + right.z*joy.L.dx
  } else {
    if(KEYS['KeyW']||KEYS['ArrowUp']||KEYS['KeyZ']){mx+=fwd.x;mz+=fwd.z}
    if(KEYS['KeyS']||KEYS['ArrowDown']){mx-=fwd.x;mz-=fwd.z}
    if(KEYS['KeyA']||KEYS['ArrowLeft']||KEYS['KeyQ']){mx-=right.x;mz-=right.z}
    if(KEYS['KeyD']||KEYS['ArrowRight']){mx+=right.x;mz+=right.z}
    if(KEYS['Space']&&onGround){ PVEL.y=JUMP; onGround=false; spawnJumpBurst() }
  }

  const len = Math.sqrt(mx*mx+mz*mz)
  if(len>0){mx/=len;mz/=len}
  PVEL.x=mx*spd; PVEL.z=mz*spd
  PVEL.y+=G*dt

  PLAYER.position.x+=PVEL.x*dt
  PLAYER.position.y+=PVEL.y*dt
  PLAYER.position.z+=PVEL.z*dt

  if(PLAYER.position.y<=0){ PLAYER.position.y=0; PVEL.y=0; onGround=true }
  onGround = PLAYER.position.y<=0.01

  platforms.forEach(p=>{
    const bb=new THREE.Box3().setFromObject(p)
    const px=PLAYER.position.x, py=PLAYER.position.y, pz=PLAYER.position.z, m=.32
    if(px>bb.min.x-m&&px<bb.max.x+m&&pz>bb.min.z-m&&pz<bb.max.z+m){
      if(py<=bb.max.y+.15&&py>=bb.max.y-.7&&PVEL.y<=0){
        PLAYER.position.y=bb.max.y; PVEL.y=0; onGround=true
      }
    }
  })

  PLAYER.rotation.y=YAW; cam.rotation.x=PITCH

  const speed = Math.sqrt(PVEL.x*PVEL.x+PVEL.z*PVEL.z)
  document.getElementById('sv_spd').textContent=speed.toFixed(1)

  if(PLAYER.userData.vis){
    PLAYER.userData.vis.material.emissive.setHex(speed>SPRINT_SPD*.7 ? 0xff007a : 0x00fff5)
  }
  if(PLAYER.userData.pLight){
    PLAYER.userData.pLight.color.setHSL(colorShift,1,.5)
    PLAYER.userData.pLight.intensity=1.5+Math.sin(T*3)*.4
  }

  if((Math.abs(mx)+Math.abs(mz))>.1 && Math.random()<.35) spawnTrail(sprinting)

  const py=PLAYER.position.y
  let zone = py>22?'APEX':py>14?'MIDLEVEL':py>7?'OVERPASS':'DOWNTOWN'
  document.getElementById('zoneBadge').textContent=zone

  const now=Date.now()
  if(now-lastSend>90&&CHAN){
    lastSend=now
    const p=PLAYER.position
    CHAN.send({type:'broadcast',event:'move',payload:{id:ME.id,name:MYNAME,x:+p.x.toFixed(2),y:+p.y.toFixed(2),z:+p.z.toFixed(2),ry:+YAW.toFixed(3)}})
  }
}

function updateWorld(dt){
  BUILD_LIGHTS.forEach((bl,i)=>{
    if(bl.blink) bl.light.intensity=(Math.sin(T*2+i)*.5+.5)>.5?bl.baseI:0
    else bl.light.intensity=bl.baseI*(.85+Math.sin(T*1.5+i*.8)*.15)
  })
  const fogCol=new THREE.Color().setHSL(Math.sin(T*.04)*.5+.5,.7,.015)
  scene.fog.color.copy(fogCol); renderer.setClearColor(fogCol)
}

function updateCollectibles(dt){
  collectibles.forEach((c,idx)=>{
    if(!c.visible) return
    c.rotation.y+=dt*2.5; c.rotation.x+=dt*.8
    c.position.y=c.userData.baseY+Math.sin(T*2+idx)*.3
    if(c.userData.ring){ c.userData.ring.position.copy(c.position); c.userData.ring.rotation.x+=dt*2 }
    if(c.userData.light) c.userData.light.position.copy(c.position)
    if(c.position.distanceTo(PLAYER.position)<1.6){
      CREDITS+=c.userData.val; XP+=20
      document.getElementById('credDisplay').textContent='B '+CREDITS
      document.getElementById('xpF').style.width=Math.min(100,(XP%500)/5)+'%'
      spawnCollectBurst(c.position.clone(),c.userData.col)
      notif('+'+c.userData.val+' CREDITS','gold')
      c.visible=false
      if(c.userData.light) c.userData.light.visible=false
      if(c.userData.ring)  c.userData.ring.visible=false
      setTimeout(()=>{ c.visible=true; if(c.userData.light)c.userData.light.visible=true; if(c.userData.ring)c.userData.ring.visible=true },20000)
    }
  })
}

// ====== PARTICLES ======
function mkP(pos,vel,col,life,size=.06){
  const geo=new THREE.SphereGeometry(size,3,3)
  const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:1,blending:THREE.AdditiveBlending})
  const m=new THREE.Mesh(geo,mat); m.position.copy(pos); scene.add(m)
  PARTS.push({m,vel:vel.clone(),life:0,maxLife:life})
}
function spawnTrail(sprinting){
  const col=sprinting?0xff007a:0x00fff5
  const p=PLAYER.position.clone(); p.y+=.5
  p.x+=(Math.random()-.5)*.3; p.z+=(Math.random()-.5)*.3
  mkP(p,new THREE.Vector3((Math.random()-.5)*.7,Math.random()*.4,(Math.random()-.5)*.7),col,.3,.04)
}
function spawnJumpBurst(){
  const p=PLAYER.position.clone(); p.y+=.1
  for(let i=0;i<18;i++){
    const angle=Math.random()*Math.PI*2, sp=3+Math.random()*5
    mkP(p.clone(),new THREE.Vector3(Math.cos(angle)*sp,.5+Math.random()*3,Math.sin(angle)*sp),
      [0x00fff5,0xff007a,0xffee00,0x9d00ff][Math.floor(Math.random()*4)],.6,.07)
  }
}
function spawnCollectBurst(pos,col){
  for(let i=0;i<IS_TOUCH?18:35;i++){
    const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI, sp=4+Math.random()*7
    mkP(pos.clone(),new THREE.Vector3(Math.cos(ph)*Math.cos(th)*sp,Math.sin(ph)*sp,Math.cos(ph)*Math.sin(th)*sp),col,.8,.08)
  }
}
function updateParticles(dt){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i]; p.life+=dt
    const t=p.life/p.maxLife
    p.m.position.addScaledVector(p.vel,dt); p.vel.y-=5*dt
    p.m.material.opacity=(1-t)*.9; p.m.scale.setScalar(Math.max(.05,1-t*.6))
    if(p.life>=p.maxLife){ scene.remove(p.m); p.m.geometry.dispose(); p.m.material.dispose(); PARTS.splice(i,1) }
  }
}

// ====== MINIMAP ======
function updateMinimap(){
  const cv=document.getElementById('mmCanvas'), sz=110
  const ctx=cv.getContext('2d'); ctx.clearRect(0,0,sz,sz)
  ctx.fillStyle='rgba(1,2,8,.6)'; ctx.fillRect(0,0,sz,sz)
  const scale=.4, cx=sz/2, cy=sz/2
  const px=PLAYER.position.x, pz=PLAYER.position.z
  buildings.forEach(b=>{
    const bx=(b.position.x-px)*scale+cx, bz=(b.position.z-pz)*scale+cy
    ctx.fillStyle='rgba(0,255,245,.06)'; ctx.fillRect(bx-2,bz-2,5,5)
  })
  Object.values(OTHERS).forEach(o=>{
    if(!o.mesh) return
    const ox=(o.mesh.position.x-px)*scale+cx, oz=(o.mesh.position.z-pz)*scale+cy
    ctx.beginPath(); ctx.arc(ox,oz,4,0,Math.PI*2)
    ctx.fillStyle='#ff007a'; ctx.shadowColor='#ff007a'; ctx.shadowBlur=6; ctx.fill()
  })
  collectibles.forEach(c=>{
    if(!c.visible) return
    const ox=(c.position.x-px)*scale+cx, oz=(c.position.z-pz)*scale+cy
    ctx.beginPath(); ctx.arc(ox,oz,3,0,Math.PI*2)
    ctx.fillStyle='#ffee00'; ctx.shadowColor='#ffee00'; ctx.shadowBlur=5; ctx.fill()
  })
  ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2)
  ctx.fillStyle='#00fff5'; ctx.shadowColor='#00fff5'; ctx.shadowBlur=12; ctx.fill()
  ctx.shadowBlur=0; ctx.beginPath(); ctx.moveTo(cx,cy)
  ctx.lineTo(cx+Math.sin(YAW)*14,cy-Math.cos(YAW)*14)
  ctx.strokeStyle='rgba(0,255,245,.9)'; ctx.lineWidth=2; ctx.stroke()
}

// ====== NOTIFS ======
function notif(text,type='cyan'){
  const el=document.createElement('div'); el.className='notif '+type; el.textContent=text
  document.getElementById('notifs').appendChild(el)
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .4s'; setTimeout(()=>el.remove(),500) },2200)
}

// ====== MULTIPLAYER ======
function initMP(){
  CHAN = sb.channel('ryonix-v1',{config:{broadcast:{self:false}}})
  CHAN
    .on('broadcast',{event:'move'},({payload})=>moveOther(payload))
    .on('broadcast',{event:'chat'},({payload})=>addChatMsg(payload.name,payload.text))
    .on('broadcast',{event:'leave'},({payload})=>{ rmOther(payload.id); sysmsg(payload.name+' a quitte la ville') })
    .subscribe(()=>{
      sysmsg('Bienvenue '+MYNAME+' !')
      notif('Connecte !','cyan')
      CHAN.send({type:'broadcast',event:'move',payload:{id:ME.id,name:MYNAME,x:0,y:0,z:3,ry:0}})
    })
  window.addEventListener('beforeunload',()=>{
    if(CHAN) CHAN.send({type:'broadcast',event:'leave',payload:{id:ME.id,name:MYNAME}})
  })
}

function makeRunner(id){
  const hue=(id.charCodeAt(0)%12)/12
  const c=new THREE.Color().setHSL(hue,1,.55), hex=c.getHex()
  const mat=new THREE.MeshPhongMaterial({color:0x050a1a,emissive:hex,emissiveIntensity:.3})
  const body=new THREE.Mesh(new THREE.BoxGeometry(.6,1,.35),mat); body.position.y=.5
  const head=new THREE.Mesh(new THREE.BoxGeometry(.46,.42,.42),mat.clone()); head.position.y=1.35
  const g=new THREE.Group(); g.add(body,head); scene.add(g)
  const pl=new THREE.PointLight(hex,1.5,7); pl.position.y=1; g.add(pl)
  return g
}

function moveOther(data){
  if(!OTHERS[data.id]){
    OTHERS[data.id]={mesh:makeRunner(data.id),name:data.name}
    updateOL(); notif(data.name+' arrive !','pink')
  }
  const o=OTHERS[data.id]
  o.mesh.position.set(data.x,data.y,data.z); o.mesh.rotation.y=data.ry
}
function rmOther(id){ if(OTHERS[id]){ scene.remove(OTHERS[id].mesh); delete OTHERS[id]; updateOL() } }
function updateOL(){
  const ul=document.getElementById('pList')
  ul.innerHTML='<li><span class="pdot" style="background:var(--cyan);box-shadow:0 0 8px var(--cyan)"></span>'+MYNAME+'</li>'
  Object.values(OTHERS).forEach(o=>{
    const h=Math.floor((o.name.charCodeAt(0)%12)/12*360)
    ul.innerHTML+='<li><span class="pdot" style="background:hsl('+h+',100%,60%)"></span>'+o.name+'</li>'
  })
}

// ====== CHAT ======
function sendChat(){
  const el=document.getElementById('chatIn'); const txt=el.value.trim(); if(!txt) return; el.value=''
  addChatMsg(MYNAME,txt)
  if(IS_TOUCH) el.blur()
  if(CHAN) CHAN.send({type:'broadcast',event:'chat',payload:{name:MYNAME,text:txt}})
}
function addChatMsg(name,text){
  const c=document.getElementById('chatMsgs')
  const h=Math.abs(name.charCodeAt(0)%360), col='hsl('+h+',100%,65%)'
  const d=document.createElement('div'); d.className='cmsg'
  d.innerHTML='<span class="cn" style="color:'+col+'">'+esc(name)+'</span> <span style="color:rgba(255,255,255,.7)">'+esc(text)+'</span>'
  c.appendChild(d); c.scrollTop=c.scrollHeight
}
function sysmsg(text){
  const c=document.getElementById('chatMsgs')
  const d=document.createElement('div'); d.className='cmsg sys'; d.textContent=text
  c.appendChild(d); c.scrollTop=c.scrollHeight
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ====== SESSION AUTO ======
;(async()=>{
  try {
    const {data} = await sb.auth.getSession()
    if(data.session){ ME=data.session.user; await loadName(); boot() }
  } catch(e){ console.log('No session') }
})()
</script>
